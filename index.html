<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kamiko Loading Screen</title>
    <style>
        @font-face {
            font-family: 'Han-Zi';
            src: url('fonts/han-zi.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            background: #000;
            font-family: 'Han-Zi';
        }

        #VideoContainer {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        #BackgroundVideo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #DarkenedVideo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        #PatternOverlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            opacity: 0.4;
            z-index: 0;
        }

        #LogoImage {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 90px;
            height: 130px;
            z-index: 9999;
            animation: LogoAnimation 2s ease-out forwards;
        }

        #FooterBlock {
            position: absolute;
            bottom: 3vh;
            left: 2vw;
            z-index: 10;
            max-width: 40vw;
        }

        #HintTitle {
            font-size: clamp(16px,1.5vw,20px);
            color: #fff;
            margin-bottom: 1vh;
            letter-spacing: .15em;
            animation: TitleHintAnimation 2s ease-out forwards;
            opacity: 0;
        }

        #HintText {
            font-size: clamp(12px,1.1vw,16px);
            color: #fff;
            opacity: 0.5;
            letter-spacing: .15em;
            max-width: 800px;
            animation: HintAnimation 2s ease-out forwards;
        }

        #CenterLoadingBlock {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            z-index: 20;
            width: 60vw;
            max-width: 1050px;
            min-width: 260px;
            text-align: center;
            color: #fff;
        }

        #ProcessName {
            font-size: clamp(20px,1.3vw,18px);
            letter-spacing: .2em;
            text-transform: uppercase;
            margin-bottom: 2vh;
            text-shadow: 0 0 6px rgba(0,0,0,.8);
        }

        #ProcessBar {
            position: relative;
            width: 100%;
            height: 36.5px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.68);
            overflow: hidden;
            backdrop-filter: blur(17px);
            display: flex;
            align-items: center;
            padding: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,.7);
            margin: 0 auto;
        }

        #ProcessBarFill {
            height: 35px;
            border-radius: 4px;
            flex: 0 0 auto;
            width: 0%;
            background: #948BFE;
            transition: width 0.15s linear;
            filter: drop-shadow(0 0 3px rgba(0,0,0,.45));
        }

        #ProcessBarCharacterIcon {
            position: absolute;
            z-index: 9999;
            pointer-events: none;
            width: 126px;
            height: 74px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes GlowLogo {
            from { filter: drop-shadow(0 0 10px rgba(171, 163, 255, 1)); }
            to { filter: drop-shadow(0 0 0px rgba(33,45,44,0)); }
        }

        @keyframes LogoAnimation {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes TitleHintAnimation {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes HintAnimation {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: .5; }
        }

        @media (max-width: 768px) {
            #CenterLoadingBlock {
                width: 80vw;
            }
            #ProcessBar {
                height: 30px;
            }
            #ProcessBarFill {
                height: 28px;
            }
            #ProcessBarCharacterIcon {
                width: 90px;
                height: 52px;
            }
        }
    </style>
</head>
<body>
    <div id="VideoContainer">
        <video id="BackgroundVideo" autoplay muted loop playsinline preload="auto"></video>
        <div id="DarkenedVideo"></div>
        <img id="PatternOverlay" src="img/pattern.png" alt="Pattern">
        <img id="LogoImage" src="img/logo.png">

        <div id="FooterBlock">
            <div id="HintTitle">ИНТЕРЕСНЫЕ ФАКТЫ</div>
            <div id="HintText">Некий Тамерлан-Куки проник в ваш компьютер...</div>
        </div>

        <div id="CenterLoadingBlock">
            <div id="ProcessName">Подготовка загрузки...</div>
            <div id="ProcessBar">
                <div id="ProcessBarFill"></div>
            </div>
        </div>

        <img id="ProcessBarCharacterIcon" src="img/tanjiro_icon.png" alt="Tanjiro">
        <audio id="BackgroundMusicAudio" src="sounds/backmusic.mp3" autoplay loop style="display:none"></audio>
    </div>

    <script>
        const Characters = [
            {
                name: "Tanjiro",
                video: "Video/tanjiro.mp4",
                pattern: "img/pattern.png",
                barColor: "linear-gradient(95deg, #FF0048 0%, #FF0048 70%, #99002B 100%)",
                DropShadow: "#FF0048",
            },
            {
                name: "Zenitsu",
                video: "Video/zenitsu.mp4",
                pattern: "img/pattern.png",
                barColor: "linear-gradient(95deg, #FFE100 0%, #FFE100 70%, #FEEF80 100%)",
                DropShadow: "#FFE100",
            },
            {
                name: "Nezuko",
                video: "Video/nezuko.mp4",
                pattern: "img/pattern.png",
                barColor: "linear-gradient(95deg, #FF0F67 0%, #FF0F67 70%, #FF5292 100%)",
                DropShadow: "#FF0F67",
            },
            {
                name: "Inosuke",
                video: "Video/inosuke.mp4",
                pattern: "img/pattern.png",
                barColor: "linear-gradient(95deg, #00C0E8 0%, #00C0E8 70%, #98D3DF 100%)",
                DropShadow: "#00C0E8",
            },
        ];

        const HintCollectionArray = [
            "ВСЕ НАШИ РАБОТНИКИ ОТКРЫТЫ К ПРЕДЛОЖЕНИЯМ О РАБОТЕ, НЕ БОЙТЕСЬ ОБРАЩАТЬСЯ К КОМУ-ТО В ЛИЧНЫЕ СООБЩЕНИЯ.",
            "НАСТУПАЕТ НЕКАЯ НОВАЯ ЭРА НА НАШЕМ ПРОЕКТЕ, МЫ ОЧЕНЬ РАДЫ ЛЮБОЙ ПОДДЕРЖКЕ.",
            "ИНОГДА НАМ ДЕЙСТВИТЕЛЬНО НЕ ХВАТАЕТ РУК, ЕСЛИ ВЫ ОБЛАДАЕТЕ НАВЫКАМИ В ЛЮБОЙ ИЗ СФЕР, ТО ПИШИТЕ :^",
            "МЫ УВАЖАЕМ НАШИХ ИГРОКОВ, РАДЫ ЧТО ОНИ ОСТАЮТСЯ ДАЖЕ В ПЛОХИЕ ВРЕМЕНА.",
            "ПРОЕКТ ПЕРЕД ОТКРЫТИЕМ РАЗРАБАТЫВАЛСЯ ОКОЛО 6 МЕСЯЦЕВ, ПОЭТОМУ БАГИ - НЕ РЕДКОСТЬ.",
            "МЫ ПЛАНИРУЕМ ДОБАВЛЯТЬ ГОРАЗДО БОЛЬШЕ НОВЫХ ФИШЕК, НЕЖЕЛИ ЧЕМ ЕСТЬ СЕЙЧАС.",
            "КАЖДЫЙ ДЕНЬ МЫ ПРОСЫПАЕМСЯ С МЫСЛЬЮ О ММО РПГ 😎",
            "СЕРВЕР ЗАТОЧЕН НА ПРОТИВОСТОЯНИЕ НЕСКОЛЬКИХ ФРАКЦИЙ, ПОЭТОМУ ВЫ ВСЕГДА СМОЖЕТЕ НАЙТИ СЕБЕ ПРОТИВНИКА. БИТВЫ НА ГАЛЬКЕ - НЕОБЯЗАТЕЛЬНЫ).",
            "ИЗНАЧАЛЬНЫМ СОСТАВОМ СЕРВЕРА БЫЛИ ВСЕГО 2 ЧЕЛОВЕКА. ЭТО ВЕЛИКИЙ ДИЗАЙНЕР И МЕЛЧАЙШИЙ НА ТО ВРЕМЯ КОДЕР.",
            'МЫ ПЛАНИРУЕМ РАСШИРЯТЬ НАШУ "ФРАНШИЗУ", ЖДИТЕ БОЛЬШЕ ПРОЕКТОВ ПО РАЗНЫМ ТЕМАТИКАМ'
        ];

        let HintTypingIntervalIdentifierValue = null,
            FilesTotalAmountValue = 0,
            FilesNeededAmountValue = 0,
            CurrentAddonName = "";

        let HintIndexValue = -1,
            UsedHintsSet = new Set();

        let CurrentCharacterIndex = 0;

        function getRandomCharacterIndex() {
            return Math.floor(Math.random() * Characters.length);
        }

        function applyCharacterConfig(index) {
            const c = Characters[index] || Characters[0];
            CurrentCharacterIndex = index;

            const bgVideo = document.getElementById("BackgroundVideo");
            const pattern = document.getElementById("PatternOverlay");
            const barFill = document.getElementById("ProcessBarFill");

            if (bgVideo) {
                bgVideo.src = c.video;
                bgVideo.muted = true;
                bgVideo.load();
                bgVideo.play().catch(() => {});
            }
            if (pattern) {
                pattern.src = c.pattern;
            }
            if (barFill) {
                barFill.style.background = c.barColor;
                barFill.style.filter = `drop-shadow(0 0 1.5px ${c.DropShadow})`;
            }
        }

        function GetNextUniqueHintIndexValue() {
            if (UsedHintsSet.size === HintCollectionArray.length) {
                UsedHintsSet.clear();
            }
            do {
                HintIndexValue = (HintIndexValue + 1 + Math.floor(Math.random() * HintCollectionArray.length)) % HintCollectionArray.length;
            } while (UsedHintsSet.has(HintIndexValue));
            UsedHintsSet.add(HintIndexValue);
            return HintIndexValue;
        }

        function StartHintTypingText(NewHintTextValue) {
            const HintTextElement = document.getElementById("HintText");
            if (!HintTextElement || !NewHintTextValue) return;
            if (HintTypingIntervalIdentifierValue) {
                clearInterval(HintTypingIntervalIdentifierValue);
                HintTypingIntervalIdentifierValue = null;
            }
            HintTextElement.textContent = "";
            HintTextElement.style.opacity = "0.5";
            let CurrentCharIndexValue = 0;
            HintTypingIntervalIdentifierValue = setInterval(() => {
                if (CurrentCharIndexValue >= NewHintTextValue.length) {
                    clearInterval(HintTypingIntervalIdentifierValue);
                    HintTypingIntervalIdentifierValue = null;
                    return;
                }
                HintTextElement.textContent += NewHintTextValue.charAt(CurrentCharIndexValue++);
            }, 25);
        }

        function UpdateTanjiroPosition() {
            const fill = document.getElementById("ProcessBarFill");
            const icon = document.getElementById("ProcessBarCharacterIcon");
            if (!fill || !icon) return;

            const fillRect = fill.getBoundingClientRect();

            const iconWidth  = icon.offsetWidth || 126;
            const iconHeight = icon.offsetHeight || 74;

            const targetX = fillRect.right;
            const targetY = fillRect.top + fillRect.height / 2;

            icon.style.left = targetX + "px";
            icon.style.top  = targetY + "px";
            icon.style.transform = `translate(-${iconWidth / 2}px, -${iconHeight / 2}px)`;
        }

        function UpdateLoadingProgressLine() {
            const ProcessBarFillElement = document.getElementById("ProcessBarFill");
            const ProcessNameElement    = document.getElementById("ProcessName");
            if (!ProcessBarFillElement || !ProcessNameElement) return;

            let progress = 0;
            if (FilesTotalAmountValue > 0 && FilesNeededAmountValue >= 0) {
                progress = 1 - (FilesNeededAmountValue / FilesTotalAmountValue);
            }
            const progressPercent = Math.round(Math.max(0, Math.min(1, progress)) * 100);

            ProcessBarFillElement.style.width = progressPercent + "%";
            ProcessNameElement.textContent = CurrentAddonName
                ? `Загрузка: ${CurrentAddonName}`
                : "Подготовка загрузки...";

            console.log("Loading progress:", progressPercent + "%");

            UpdateTanjiroPosition();
        }

        window.SetFilesTotal = (TotalAmountValue) => {
            FilesTotalAmountValue = Math.max(1, parseInt(TotalAmountValue) || 1);
            UpdateLoadingProgressLine();
        };

        window.SetFilesNeeded = (NeededAmountValue) => {
            FilesNeededAmountValue = parseInt(NeededAmountValue) || 0;
            UpdateLoadingProgressLine();
        };

        window.SetAddonDownload = (addonName, totalBytes, downloadedBytes) => {
            CurrentAddonName = addonName || "";
            const total = Math.max(1, parseInt(totalBytes) || 1);
            const downloaded = parseInt(downloadedBytes) || 0;
            FilesTotalAmountValue = total;
            FilesNeededAmountValue = Math.max(0, total - downloaded);
            UpdateLoadingProgressLine();
        };

        window.SetStatusChanged = (StatusTextValue) => {
            CurrentAddonName = "";
            const ProcessNameElement = document.getElementById("ProcessName");
            if (ProcessNameElement) ProcessNameElement.textContent = StatusTextValue;
            const ProcessBarFillElement = document.getElementById("ProcessBarFill");
            if (ProcessBarFillElement) ProcessBarFillElement.style.width = "0%";
            console.log("Loading progress: 0%");
            UpdateTanjiroPosition();
        };

        window.onload = () => {
            const charIndex = getRandomCharacterIndex();
            applyCharacterConfig(charIndex);

            const BackgroundVideoElement = document.getElementById("BackgroundVideo");
            if (BackgroundVideoElement) {
                BackgroundVideoElement.play().catch(() => {});
            }

            StartHintTypingText(HintCollectionArray[GetNextUniqueHintIndexValue()]);
            setInterval(() => {
                StartHintTypingText(HintCollectionArray[GetNextUniqueHintIndexValue()]);
            }, 4500);

            UpdateTanjiroPosition();
        };

        window.addEventListener("resize", () => {
            UpdateTanjiroPosition();
        });
    </script>
</body>
</html>
